name: Deploy API to Unkey

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: opencoredev/agent-center

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          build-args: |
            VITE_API_URL=
            VITE_AUTH_ENABLED=true
            VITE_ZERO_ENABLED=false
            VITE_ZERO_CACHE_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Deploy to Unkey
        env:
          UNKEY_ROOT_KEY: ${{ secrets.UNKEY_ROOT_KEY }}
          UNKEY_PROJECT: ${{ vars.UNKEY_PROJECT || 'proj_ZrO06tMX' }}
          UNKEY_APP: ${{ vars.UNKEY_APP || 'agent-center' }}
          UNKEY_ENV: ${{ vars.UNKEY_ENV || 'production' }}
        run: |
          bunx --yes unkey deploy "${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}" \
            --project="${UNKEY_PROJECT}" \
            --app="${UNKEY_APP}" \
            --env="${UNKEY_ENV}" \
            --branch="${GITHUB_REF_NAME}" \
            --commit="${GITHUB_SHA}"
