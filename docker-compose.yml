# ── Development: just Postgres ────────────────────────────────────────────
# Run with: docker compose up postgres
#
# ── Self-hosted (full stack): ─────────────────────────────────────────────
# Run with: docker compose --profile full up
#
# Open http://localhost:3100 in your browser.

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-center-postgres
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5
    environment:
      POSTGRES_DB: agent_center
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 3s
      timeout: 3s
      retries: 10

  zero-cache:
    image: rocicorp/zero:latest
    container_name: agent-center-zero
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ZERO_PORT:-4848}:4848"
    environment:
      ZERO_UPSTREAM_DB: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/agent_center
      ZERO_CVR_DB: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/agent_center
      ZERO_CHANGE_DB: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/agent_center
      ZERO_REPLICA_FILE: /tmp/zero-cache.db
      ZERO_NUM_SYNC_WORKERS: 4

  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-3100}:3100"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/agent_center
      API_HOST: "0.0.0.0"
      API_PORT: "3100"
      NODE_ENV: production
      SERVE_FRONTEND: "true"
      FRONTEND_DIST_PATH: apps/web/dist
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-changeme}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
    profiles: [full]

  worker:
    build:
      context: .
      dockerfile: deploy/worker.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/agent_center
      NODE_ENV: production
      WORKER_ID: docker-worker
      RUNNER_INTERNAL_BASE_URL: http://runner:3002
    profiles: [full]

  runner:
    build:
      context: .
      dockerfile: deploy/runner.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/agent_center
      NODE_ENV: production
      RUNNER_HOST: "0.0.0.0"
      RUNNER_PORT: "3002"
      RUNNER_API_URL: http://api:3100
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      E2B_API_KEY: ${E2B_API_KEY:-}
    volumes:
      - runner_workspaces:/app/.agent-center/runner-workspaces
    profiles: [full]

volumes:
  postgres_data:
  runner_workspaces:
